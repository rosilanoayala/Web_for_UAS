<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — DevPortal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --border: #e0e6ed;
      --text: #2d3748;
      --text-sub: #5a6a7e;
      --nav-bg: #282a35;
      --accent: #04aa6d;
      --accent-dk: #038c5a;
      --warn: #d97706;
      --warn-light: #fffbeb;
      --warn-border: #fcd34d;
      --font-ui: 'Source Sans 3', system-ui, sans-serif;
      --font-code: 'Fira Code', monospace;
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.13);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topnav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 36px;
      height: 58px;
      background: var(--nav-bg);
      flex-shrink: 0;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { background: var(--accent); color: #fff; font-family: var(--font-code); font-weight: 600; font-size: 0.85rem; padding: 4px 9px; border-radius: 6px; }
    .logo-text { font-size: 1.15rem; font-weight: 700; color: #fff; }
    .nav-back { text-decoration: none; color: #cdd5e0; font-size: 0.875rem; font-weight: 600; padding: 6px 14px; border-radius: 6px; transition: 0.2s; }
    .nav-back:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #f0faf5 0%, #e8f4fd 100%);
    }
    .reset-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: var(--shadow-lg);
    }
    .card-header { text-align: center; margin-bottom: 28px; }
    .card-icon { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; background: #fff8ec; border: 2px solid #fcd34d; border-radius: 14px; font-size: 1.6rem; margin-bottom: 14px; }
    .card-title { font-size: 1.5rem; font-weight: 800; color: var(--text); }
    .card-subtitle { font-size: 0.9rem; color: var(--text-sub); margin-top: 6px; line-height: 1.5; }

    .info-box {
      background: var(--warn-light);
      border: 1px solid var(--warn-border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: var(--warn);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 22px;
    }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: var(--font-ui);
      font-size: 0.925rem;
      background: var(--bg);
      outline: none;
      transition: 0.2s;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(4,170,109,0.15); background: #fff; }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 6px;
    }
    .btn-primary:hover { background: var(--accent-dk); transform: translateY(-1px); }
    .back-link { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 20px; font-size: 0.875rem; color: var(--text-sub); text-decoration: none; font-weight: 600; }
    .back-link:hover { color: var(--accent); }
    .success-box { display: none; text-align: center; padding: 8px 0; }
    .success-box.visible { display: block; }
    .success-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .page-footer {
      background: var(--nav-bg);
      padding: 14px 36px;
      text-align: center;
      font-size: 0.78rem;
      color: #5a6370;
      font-family: var(--font-code);
      flex-shrink: 0;
    }
    .step { display: none; }
    .step.active-step { display: block; }
    .notice { padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; }
    .notice.visible { display: block; }
    @media (max-width: 480px) {
      .reset-card { padding: 32px 22px; }
      .topnav { padding: 0 18px; }
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="HOME.html" class="nav-logo"><span class="logo-icon">&lt;/&gt;</span><span class="logo-text">DevPortal</span></a>
    <a href="login.html" class="nav-back">← Kembali ke Login</a>
  </nav>

  <div class="page-body">
    <div class="reset-card">
      <div class="card-header">
        <div class="card-icon">🔐</div>
        <h1 class="card-title">Reset Password</h1>
        <p class="card-subtitle">Verifikasi identitas Anda melalui pertanyaan keamanan</p>
      </div>

      <div id="notice" class="notice"></div>

      <!-- Step 1: Email -->
      <div id="step1" class="step active-step">
        <div class="info-box">💡 Masukkan email yang terdaftar.</div>
        <div class="form-group">
          <label class="form-label">Alamat Email</label>
          <input type="email" id="resetEmail" class="form-input" placeholder="contoh@email.com" required>
        </div>
        <button id="checkEmailBtn" class="btn-primary">Lanjutkan</button>
      </div>

      <!-- Step 2: Pertanyaan keamanan -->
      <div id="step2" class="step">
        <div class="info-box" id="securityQuestionText"></div>
        <div class="form-group">
          <label class="form-label">Jawaban Anda</label>
          <input type="text" id="securityAnswer" class="form-input" placeholder="Jawaban (case-insensitive)">
        </div>
        <button id="verifyAnswerBtn" class="btn-primary">Verifikasi</button>
        <button id="backToStep1Btn" class="btn-primary" style="background:#6c757d; margin-top:10px;">Kembali</button>
      </div>

      <!-- Step 3: Password baru -->
      <div id="step3" class="step">
        <div class="form-group">
          <label class="form-label">Password Baru</label>
          <input type="password" id="newPassword" class="form-input" placeholder="Minimal 6 karakter, harus angka">
        </div>
        <div class="form-group">
          <label class="form-label">Konfirmasi Password Baru</label>
          <input type="password" id="confirmNewPassword" class="form-input" placeholder="Ulangi password baru">
        </div>
        <button id="resetPasswordBtn" class="btn-primary">Reset Password</button>
        <button id="backToLoginBtn" class="btn-primary" style="background:#6c757d; margin-top:10px;">Kembali ke Login</button>
      </div>

      <a href="login.html" class="back-link">← Kembali ke halaman Login</a>
    </div>
  </div>

  <footer class="page-footer">© 2025 DevPortal — Portal Tutorial Coding · Rosilano Ayala KA2A</footer>

  <script src="shared.js"></script>
  <script>
    let currentUser = null;

    document.getElementById('checkEmailBtn').addEventListener('click', async () => {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) { showNotice('notice', 'Masukkan email terlebih dahulu.', true); return; }
      const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
      const user = users.find(u => u.email === email);
      if (!user) { showNotice('notice', 'Email tidak terdaftar.', true); return; }
      currentUser = user;
      let questionText = '';
      switch (user.securityQuestion) {
        case 'nama_hewan': questionText = 'Apa nama hewan peliharaanmu?'; break;
        case 'tempat_lahir': questionText = 'Di mana kamu lahir?'; break;
        case 'nama_ibu': questionText = 'Siapa nama ibu kandungmu?'; break;
        default: questionText = 'Pertanyaan keamanan';
      }
      document.getElementById('securityQuestionText').innerHTML = `🔒 ${questionText}`;
      document.getElementById('step1').classList.remove('active-step');
      document.getElementById('step2').classList.add('active-step');
    });

    document.getElementById('verifyAnswerBtn').addEventListener('click', async () => {
      const answer = document.getElementById('securityAnswer').value.trim().toLowerCase();
      if (!answer) { showNotice('notice', 'Jawaban tidak boleh kosong.', true); return; }
      const hashedAnswer = await hashPassword(answer);
      if (currentUser.securityAnswerHash !== hashedAnswer) {
        showNotice('notice', 'Jawaban salah. Silakan coba lagi.', true);
        return;
      }
      document.getElementById('step2').classList.remove('active-step');
      document.getElementById('step3').classList.add('active-step');
    });

    document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
      const newPwd = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmNewPassword').value;
      if (!isStrongPassword(newPwd)) {
        showNotice('notice', 'Password harus minimal 6 karakter dan mengandung angka.', true);
        return;
      }
      if (newPwd !== confirm) {
        showNotice('notice', 'Password baru tidak cocok.', true);
        return;
      }
      const hashedNew = await hashPassword(newPwd);
      let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
      const index = users.findIndex(u => u.email === currentUser.email);
      if (index !== -1) {
        users[index].passwordHash = hashedNew;
        localStorage.setItem('registeredUsers', JSON.stringify(users));
        showNotice('notice', '✅ Password berhasil direset. Silakan login.', false);
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } else {
        showNotice('notice', 'Terjadi kesalahan, coba lagi.', true);
      }
    });

    document.getElementById('backToStep1Btn').addEventListener('click', () => {
      document.getElementById('step2').classList.remove('active-step');
      document.getElementById('step1').classList.add('active-step');
      document.getElementById('securityAnswer').value = '';
    });
    document.getElementById('backToLoginBtn').addEventListener('click', () => {
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
