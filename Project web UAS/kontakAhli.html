<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontak Ahli — DevPortal</title>
  <link rel="icon" type="image/png" href="favicon.png"> 
  <link rel="apple-touch-icon" href="favicon.png">
  <style>
    :root {
      --main: #22c55e;
      --main-dark: #16a34a;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #1e293b;
      --text-sub: #475569;
      --border: #e2e8f0;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --radius: 20px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: var(--surface);
      padding: 40px 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
      width: 100%;
      max-width: 1000px; /* lebih lebar */
    }

    h1 {
      color: var(--main);
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-sub);
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .card {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 30px 24px;
      flex: 1 1 240px;
      max-width: 280px;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    /* GAMBAR DIPERBESAR */
    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--main);
      margin-bottom: 16px;
      background: #e2e8f0; /* fallback color */
    }

    .card h2 {
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card p {
      color: var(--text-sub);
      font-size: 0.95rem;
      margin-bottom: 20px;
      word-break: break-all;
    }

    .insta-btn {
      display: inline-block;
      background: var(--main);
      color: white;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.2s;
    }

    .insta-btn:hover {
      background: var(--main-dark);
      transform: scale(1.03);
    }

    .back {
      display: inline-block;
      margin-top: 10px;
      color: var(--text-sub);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .back:hover {
      color: var(--main);
    }

    @media (max-width: 800px) {
      .container {
        padding: 30px 20px;
      }
      .card {
        max-width: 100%;
      }
      .avatar {
        width: 110px;
        height: 110px;
      }
    }
  </style>
</head>
<body>
