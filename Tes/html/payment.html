<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROAMING · Pembayaran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/payment.css">
</head>
<body>
  <audio id="fireAmbient" loop preload="auto">
    <source src="../assets/sounds/fire-ambient.mp3" type="audio/mpeg">
  </audio>
  <div id="soundControl" class="sound-control" title="Suara Perapian"><i class="fas fa-volume-up"></i></div>

  <div class="wrapper">
    <nav>
      <div class="logo"><a href="index.html"><i class="fas fa-fire"></i> ROAMING</a></div>
      <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Perapian</a>
        <a href="market.html"><i class="fas fa-store-alt"></i> Market</a>
        <a href="cart.html" class="cart-link" title="Keranjang">
          <i class="fas fa-shopping-basket"></i>
          <span class="cart-count" id="cartBadge" style="display:none;">0</span>
        </a>
      </div>
    </nav>

    <h2><i class="fas fa-credit-card"></i> Pembayaran</h2>

    <div class="order-summary" id="orderSummary">
      <p>Memuat ringkasan pesanan...</p>
    </div>

    <form id="paymentForm" class="payment-form">
      <div id="paymentError" class="error-message hidden"></div>
      <h3>Metode Pembayaran</h3>
      <div class="payment-methods">
        <label class="payment-method">
          <input type="radio" name="method" value="transfer" checked>
          <i class="fas fa-university method-icon"></i>
          <span class="method-text">Transfer Bank</span>
        </label>
        <label class="payment-method">
          <input type="radio" name="method" value="ewallet">
          <i class="fas fa-wallet method-icon"></i>
          <span class="method-text">E-Wallet</span>
        </label>
      </div>
      <div class="form-group">
        <label for="bankSelect">Bank / E-Wallet</label>
        <select id="bankSelect" class="form-input">
          <option value="bca">BCA</option><option value="mandiri">Mandiri</option>
          <option value="bni">BNI</option><option value="bri">BRI</option>
        </select>
      </div>
      <div class="form-group">
        <label for="accountNumber">Nomor Rekening / HP</label>
        <input type="text" id="accountNumber" class="form-input" placeholder="Masukkan nomor rekening atau HP">
      </div>
      <div class="form-group">
  <label for="accountName">Nama Pemilik Akun</label>
  <input type="text" id="accountName" class="form-input" placeholder="Nama lengkap pemilik akun">
</div>

<div class="form-group">
  <label for="paymentProof">Bukti Pembayaran <small>(opsional, maks 2MB)</small></label>
  <input type="file" id="paymentProof" class="form-input" accept="image/*">
  <small>Upload screenshot / foto bukti transfer.</small>
</div>
      <button type="submit" class="btn-pay"><i class="fas fa-check-circle"></i> Konfirmasi Pembayaran</button>
      <a href="cart.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Keranjang</a>
    </form>

    <div class="fire-footer">
      <canvas id="fireCanvas"></canvas>
      <div class="footer-quote">“Setiap pembayaran adalah percikan hangat.”</div>
      <div class="copyright">© 2025 ROAMING</div>
    </div>
  </div>

  <script src="../js/nav-auth.js"></script>
  <script src="../js/payment.js"></script>
</body>
</html>
