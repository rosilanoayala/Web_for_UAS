<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROAMING · Struk Pembayaran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/receipt.css"> <!-- CSS khusus struk -->
</head>
<body>
  <audio id="fireAmbient" loop preload="auto">
    <source src="../assets/sounds/fire-ambient.mp3" type="audio/mpeg">
  </audio>
  <div id="soundControl" class="sound-control" title="Suara Perapian"><i class="fas fa-volume-up"></i></div>

  <div class="wrapper">
    <nav>
      <div class="logo"><a href="index.html"><i class="fas fa-fire"></i> ROAMING</a></div>
      <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Perapian</a>
        <a href="market.html"><i class="fas fa-store-alt"></i> Market</a>
        <a href="cart.html"><i class="fas fa-shopping-cart"></i> Keranjang</a>
      </div>
    </nav>

    <div class="receipt-box">
      <div class="receipt-icon"><i class="fas fa-check-circle"></i></div>
      <h2>Pembayaran Berhasil!</h2>
      <p class="receipt-date" id="receiptDate"></p>
      <div class="receipt-details" id="receiptItems"></div>
      <div class="receipt-total" id="receiptTotal"></div>
      <div id="receiptProof" class="receipt-proof hidden">
        <p class="proof-label">📸 Bukti Pembayaran</p>
        <img id="proofImage" class="proof-image" src="" alt="Bukti Pembayaran">
      </div>
      <p class="receipt-note">🔥 Terima kasih telah berbelanja di perapian. Barang akan segera diproses.</p>
      <a href="index.html" class="btn-home"><i class="fas fa-home"></i> Kembali ke Perapian</a>
    </div>

    <div class="fire-footer">
      <canvas id="fireCanvas"></canvas>
      <div class="copyright">© 2025 ROAMING</div>
    </div>
  </div>

  <script src="../js/receipt.js"></script>
</body>
</html>
