<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROAMING · Pembayaran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/checkout.css">
</head>
<body>
  <audio id="fireAmbient" loop preload="auto">
    <source src="../assets/sounds/fire-ambient.mp3" type="audio/mpeg">
  </audio>

  <div id="soundControl" class="sound-control" title="Suara Perapian">
    <i class="fas fa-volume-up"></i>
  </div>

  <div class="wrapper">
    <nav>
      <div class="logo"><a href="index.html"><i class="fas fa-fire"></i> ROAMING</a></div>
      <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Perapian</a>
        <a href="market.html"><i class="fas fa-store-alt"></i> Market</a>
        <a href="cart.html" class="cart-link" title="Keranjang">
          <i class="fas fa-shopping-basket"></i>
          <span class="cart-count" id="cartBadge" style="display:none;">0</span>
        </a>
      </div>
    </nav>

    <div class="checkout-container">
      <h2><i class="fas fa-credit-card"></i> Pembayaran</h2>
      
      <!-- Ringkasan Pesanan -->
      <div class="order-summary" id="orderSummary"></div>

      <!-- Form Pembayaran -->
      <form id="paymentForm" class="payment-form">
        <h3>Metode Pembayaran</h3>
        <div class="payment-methods">
          <label class="payment-method">
            <input type="radio" name="method" value="transfer" checked>
            <span class="method-icon"><i class="fas fa-university"></i></span>
            <span class="method-text">Transfer Bank</span>
          </label>
          <label class="payment-method">
            <input type="radio" name="method" value="ewallet">
            <span class="method-icon"><i class="fas fa-wallet"></i></span>
            <span class="method-text">E-Wallet</span>
          </label>
        </div>

        <h3>Detail Pembayaran</h3>
        <div class="form-group">
          <label for="bankSelect">Pilih Bank / E-Wallet</label>
          <select id="bankSelect" class="form-input">
            <option value="bca">BCA</option>
            <option value="mandiri">Mandiri</option>
            <option value="bni">BNI</option>
            <option value="gopay">GoPay</option>
            <option value="ovo">OVO</option>
            <option value="dana">DANA</option>
          </select>
        </div>

        <div class="form-group">
          <label for="accountNumber">Nomor Rekening / Akun</label>
          <input type="text" id="accountNumber" class="form-input" placeholder="Masukkan nomor rekening/akun" maxlength="30">
        </div>

        <div class="form-group">
          <label for="accountName">Nama Pemilik Akun</label>
          <input type="text" id="accountName" class="form-input" placeholder="Nama sesuai akun" maxlength="50">
        </div>

        <div class="form-group">
          <label for="paymentProof">Bukti Pembayaran (opsional)</label>
          <input type="file" id="paymentProof" class="form-input" accept="image/*">
          <small>Kosongkan jika tidak ada bukti.</small>
        </div>

        <div id="paymentError" class="error-message hidden"></div>

        <button type="submit" class="btn-pay">
          <i class="fas fa-check-circle"></i> Konfirmasi Pembayaran
        </button>
        <a href="cart.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Keranjang</a>
      </form>
    </div>

    <div class="fire-footer">
      <canvas id="fireCanvas"></canvas>
      <div class="footer-quote">“Pembayaran yang hangat, bukan beban.”</div>
      <div class="copyright">© 2025 ROAMING</div>
    </div>
  </div>

  <script src="../js/checkout.js"></script>
  <script src="../js/nav-auth.js"></script>
</body>
</html>
