<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROAMING · Profilku</title>
  <!-- Font & Icon -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- CSS Profil -->
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
  <!-- AMBIENT SOUND -->
  <audio id="fireAmbient" loop preload="auto">
    <source src="../assets/sounds/fire-ambient.mp3" type="audio/mpeg">
  </audio>

  <!-- TOMBOL SUARA -->
  <div id="soundControl" class="sound-control" title="Suara Perapian">
    <i class="fas fa-volume-up"></i>
  </div>

  <div class="wrapper">
    <!-- Navigasi -->
    <nav>
      <div class="logo"><a href="index.html"><i class="fas fa-fire"></i> ROAMING</a></div>
      <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Perapian</a>
        <a href="market.html"><i class="fas fa-store-alt"></i> Market</a>
        <a href="fanart.html"><i class="fas fa-palette"></i> Fan Art</a>
        <a href="free.html"><i class="fas fa-gift"></i> Bara Gratis</a>
        <a href="schedule.html"><i class="fas fa-calendar-alt"></i> Agenda</a>
        <a href="clip.html"><i class="fas fa-video"></i> Bara Rekam</a>
      </div>
    </nav>

    <!-- Konten Profil -->
    <div class="profile-container">
      <!-- Jika belum login, tampilkan pesan -->
      <div id="notLoggedIn" class="profile-card hidden">
        <i class="fas fa-fire" style="font-size: 4rem; opacity: 0.5; margin-bottom: 20px;"></i>
        <h2>Kau belum masuk ke perapian</h2>
        <p>Masuk atau daftar untuk melihat profilmu.</p>
        <a href="login.html" class="btn-auth"><i class="fas fa-sign-in-alt"></i> Masuk / Daftar</a>
      </div>

      <!-- Profil untuk pengguna yang sudah login -->
      <div id="loggedInProfile" class="profile-card hidden">
        <div class="profile-avatar">
          <i class="fas fa-user-circle"></i>
        </div>
        <h2 id="profileName">Nama Pengguna</h2>
        <p class="profile-joined" id="profileJoined">Bergabung sejak ...</p>
        
        <div class="profile-stats">
          <div class="stat-card">
            <i class="fas fa-palette"></i>
            <span class="stat-number" id="fanartCount">0</span>
            <span class="stat-label">FanArt</span>
          </div>
          <div class="stat-card">
            <i class="fas fa-video"></i>
            <span class="stat-number" id="clipCount">0</span>
            <span class="stat-label">Klip</span>
          </div>
          <div class="stat-card">
            <i class="fas fa-fire"></i>
            <span class="stat-number" id="emberCount">0</span>
            <span class="stat-label">Bara Dibakar</span>
          </div>
        </div>

        <button class="btn-logout" id="profileLogoutBtn">
          <i class="fas fa-sign-out-alt"></i> Keluar dari Perapian
        </button>
      </div>
    </div>

    <!-- Footer Api -->
    <div class="fire-footer">
      <canvas id="fireCanvas"></canvas>
      <div class="footer-quote">“Profilmu adalah bara kecil di perapian ini.”</div>
      <div class="copyright">© 2025 ROAMING</div>
    </div>
  </div>

  <script src="../js/profile.js"></script>
</body>
</html>
