<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Try HTML - Budget Edition</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  display:flex;
  height:100vh;
  background:#0f172a;
  color:white;
}

/* EDITOR */
.editor{
  width:50%;
  padding:25px;
  background:#111827;
  display:flex;
  flex-direction:column;
}

.editor h2{
  margin:0 0 10px 0;
  color:#22c55e;
}

textarea{
  flex:1;
  width:100%;
  background:#0f172a;
  color:#22c55e;
  font-family:monospace;
  font-size:14px;
  border:none;
  padding:15px;
  border-radius:10px;
  resize:none;
}

button{
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#16a34a;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:translateY(-2px);
}

/* PREVIEW */
.preview{
  width:50%;
  padding:40px;
  background:#f8fafc;
  color:#111827;
  overflow:auto;
  position:relative;
}

.preview h1{color:#16a34a;}
.preview h2{color:#2563eb;}
.preview h3{color:#ca8a04;}
.preview p{color:#374151;}

/* MEME MESSAGE */
.meme-message{
  margin-top:40px;
  padding:20px;
  background:#fee2e2;
  border-left:6px solid #dc2626;
  border-radius:8px;
  color:#7f1d1d;
  font-weight:bold;
  animation:shake 1s ease-in-out infinite alternate;
}

@keyframes shake{
  0%{transform:translateX(0px);}
  100%{transform:translateX(3px);}
}

/* GLITCH TEXT */
.glitch{
  font-size:14px;
  margin-top:10px;
  opacity:.7;
  font-style:italic;
}
</style>
</head>

<body>

<div class="editor">
<h2>HTML Editor</h2>

<textarea id="code">
<h1>Hello World</h1>
<h2>This is a Sub Title</h2>
<p>Try editing this code... or don't. Our funding can't handle surprises.</p>
</textarea>

<button onclick="runCode()">Run Code (If Budget Allows)</button>
</div>

<div class="preview" id="preview">
</div>

<script>
  // PROTEKSI LOGIN
  if (localStorage.getItem("isLoggedIn") !== "true") {
    alert("🔒 Anda harus Sign In terlebih dahulu untuk menggunakan fitur Code Editor (Try It)!");
    window.location.href = "login.html";
  }

  // Simpan halaman terakhir yang dikunjungi (tanpa syarat)
  const currentPage = window.location.href;
  const pageName = currentPage.split("/").pop();
  localStorage.setItem("lastPage", currentPage);
  localStorage.setItem("lastPageName", pageName);

function runCode(){
  const code = document.getElementById("code").value;
  const preview = document.getElementById("preview");

  preview.innerHTML = "";
  let i = 0;

  function typeEffect(){
    if(i < code.length){
      preview.innerHTML += code.charAt(i);
      i++;
      setTimeout(typeEffect, 10);
    } else {
      showMeme();
    }
  }

  typeEffect();
}

function showMeme(){
  const preview = document.getElementById("preview");

  const meme = document.createElement("div");
  meme.className = "meme-message";
  meme.innerHTML = `
  <h4>Apologies! The HTML coding feature is temporarily disabled because our development budget went on vacation and never came back.</h4>
  <div class="glitch">
  Current system status: 💸 Funding Not Found<br>
  Attempting to locate investors... 404 Investors Not Found.
  </div>
  `;

  preview.appendChild(meme);
}

runCode();
</script>

</body>
</html>
