<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Try HTML - Live Editor</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', 'Source Sans 3', system-ui, sans-serif;
    background: #0f172a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Navbar sederhana */
  .topbar {
    background: #1e293b;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #334155;
  }
  .logo {
    color: #22c55e;
    font-weight: bold;
    font-size: 1.2rem;
    text-decoration: none;
    font-family: monospace;
  }
  .back-btn {
    color: #94a3b8;
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
  }
  .back-btn:hover {
    color: white;
  }

  /* Main area: editor + preview */
  .main {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
  }

  .editor-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    background: #111827;
    border-right: 2px solid #334155;
  }

  .panel-header {
    padding: 12px 16px;
    background: #0f172a;
    border-bottom: 1px solid #334155;
    color: #22c55e;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  textarea {
    flex: 1;
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.5;
    padding: 16px;
    border: none;
    resize: none;
    outline: none;
  }

  .preview-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    background: #f8fafc;
  }

  .preview-header {
    padding: 12px 16px;
    background: #e2e8f0;
    border-bottom: 1px solid #cbd5e1;
    color: #1e293b;
    font-weight: 600;
    font-size: 0.9rem;
  }

  iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: white;
  }

  button {
    margin: 12px 16px;
    padding: 8px 16px;
    background: #16a34a;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    align-self: flex-start;
  }
  button:hover {
    background: #15803d;
    transform: translateY(-1px);
  }

  @media (max-width: 768px) {
    .main {
      flex-direction: column;
    }
    .editor-panel, .preview-panel {
      width: 100%;
      height: 50%;
    }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="TutorialHTML.html" class="logo">&lt;/&gt; TryHTML Editor</a>
  <a href="TutorialHTML.html" class="back-btn">← Kembali ke Tutorial</a>
</div>

<div class="main">
  <div class="editor-panel">
    <div class="panel-header">📝 HTML Code</div>
    <textarea id="htmlCode" spellcheck="false">&lt;h1&gt;Hello, World!&lt;/h1&gt;
&lt;p&gt;Cobalah menulis kode HTML di sini.&lt;/p&gt;
&lt;button onclick="alert('Halo!')"&gt;Klik Aku&lt;/button&gt;</textarea>
    <button id="runBtn">▶ Jalankan / Refresh Preview</button>
  </div>

  <div class="preview-panel">
    <div class="preview-header">🖥️ Live Preview</div>
    <iframe id="previewFrame" title="HTML Preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
  </div>
</div>

<script>
  // ================= PROTEKSI LOGIN =================
  if (localStorage.getItem("isLoggedIn") !== "true") {
    alert("🔒 Anda harus login terlebih dahulu untuk menggunakan Try Editor!");
    window.location.href = "login.html";
  }

  // Simpan halaman terakhir (opsional)
  localStorage.setItem("lastPage", window.location.href);
  localStorage.setItem("lastPageName", window.location.href.split("/").pop());

  // ================= LIVE PREVIEW =================
  const textarea = document.getElementById("htmlCode");
  const iframe = document.getElementById("previewFrame");
  const runBtn = document.getElementById("runBtn");

  function updatePreview() {
    const code = textarea.value;
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(code);
    doc.close();
  }

  // Jalankan saat pertama kali
  updatePreview();

  // Tombol refresh
  runBtn.addEventListener("click", updatePreview);

  // Opsional: shortcut Ctrl+Enter untuk run
  textarea.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
      e.preventDefault();
      updatePreview();
    }
  });
</script>

</body>
</html>
