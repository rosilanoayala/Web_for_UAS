<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<style>
body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#f0fdf4;}
.box{background:white;padding:40px;border-radius:20px;width:360px;box-shadow:0 10px 30px rgba(0,0,0,.1);}
input,button{width:100%;padding:10px;margin:10px 0;border-radius:10px;}
button{background:#22c55e;color:white;border:none;}
</style>
</head>
<body>

<div class="box">
<h2>Sign Up</h2>
<input placeholder="Nama Lengkap">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="signup()">Daftar</button>
</div>

<script>
function signup(){
  alert("Akun berhasil dibuat! Silakan login.");
  window.location.href="login.html";
}
</script>

</body>
</html>
