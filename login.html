<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#e6f4ea;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  padding:40px;
  border-radius:20px;
  width:360px;
  box-shadow:0 15px 30px rgba(0,0,0,.1);
}

h2{
  text-align:center;
  color:#166534;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #cbd5e1;
}

button{
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

button:hover{ background:#16a34a; }

.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  border:1px solid #ddd;
  padding:10px;
  border-radius:12px;
  text-decoration:none;
  color:#444;
  font-weight:bold;
  margin-top:15px;
}

.extra-links{
  margin-top:20px;
  text-align:center;
  font-size:14px;
}

.extra-links a{
  text-decoration:none;
  color:#166534;
  font-weight:bold;
}

#loginOverlay{
  position:fixed;
  inset:0;
  background:#0f172a;
  display:none;
  justify-content:center;
  align-items:center;
}

#loginTerminal{
  width:80%;
  max-width:600px;
  background:black;
  padding:25px;
  border-radius:12px;
  color:#00ff88;
  font-family:monospace;
  white-space:pre-wrap;
}

.divider{
  display:flex;
  align-items:center;
  text-align:center;
  margin:20px 0;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  border-bottom:1px solid #ccc;
}

.divider span{
  margin:0 10px;
  font-size:12px;
  color:#666;
  font-weight:bold;
}

.guest-btn{
  display:block;
  text-align:center;
  padding:10px;
  border-radius:12px;
  background:#f1f5f9;
  color:#111;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.guest-btn:hover{
  background:#e2e8f0;
}

</style>
</head>

<body>

<div class="container">
  <h2>Login</h2>

  <p id="loginNotice" style="color:#dc2626; text-align:center; font-weight:bold;"></p>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <a href="#" class="google-btn" id="googleBtn">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18">
    Login dengan Google
  </a>

  <div class="extra-links">
    <p>Belum punya akun?
      <a href="SignupTutorial.html">Sign up</a>
    </p>
    <p>
      <a href="LupaPassword.html">Lupa password?</a>
    </p>
  </div>
  <div class="divider">
  <span>ATAU</span>
</div>

<a href="HOME.html" class="guest-btn" onclick="setGuest()">
  Lanjut sebagai Guest (Limited Access)
</a>
</div>



<div id="loginOverlay">
  <pre id="loginTerminal"></pre>
</div>

<script>

    function setGuest(){
  localStorage.setItem("isGuest","true");
}
document.addEventListener("DOMContentLoaded", function(){

    // ===== TAMPILKAN PESAN =====
const notice = localStorage.getItem("loginMessage");

if(notice){
  document.getElementById("loginNotice").textContent = notice;
  localStorage.removeItem("loginMessage");
}

  // ===== CEK LOGIN =====
if(localStorage.getItem("isLoggedIn")==="true"){

  const redirectPage = localStorage.getItem("redirectAfterLogin");
  const lastPage = localStorage.getItem("lastPage");

  if(redirectPage){
    window.location.href = redirectPage;
  }
  else if(lastPage){
    window.location.href = lastPage;
  }
  else{
    window.location.href = "HOME.html";
  }

  return;
}

  const loginForm = document.getElementById("loginForm");
  const googleBtn = document.getElementById("googleBtn");

  loginForm.addEventListener("submit", function(e){
    e.preventDefault();
    const email = document.getElementById("email").value;
    runLoginAnimation(email);
  });

  googleBtn.addEventListener("click", function(e){
    e.preventDefault();
    runLoginAnimation("googleuser@gmail.com");
  });

});


function runLoginAnimation(email){

  const overlay = document.getElementById("loginOverlay");
  const terminal = document.getElementById("loginTerminal");

  overlay.style.display = "flex";
  terminal.textContent = "";

  const lastPage = localStorage.getItem("lastPage");
  const pageName = localStorage.getItem("lastPageName");

  const displayName = pageName
    ? pageName.replace(".html","").replace("Tutorial","Tutorial ")
    : "HOME";

  const lines = [
    "// Initializing Authentication Module",
    "Connecting to secure server...",
    "Encrypting credentials...",
    "Validating session token...",
    "Access Granted ✔",
    `Redirecting to ${displayName}...`
  ];

  let i=0, j=0;

  function type(){
    if(i>=lines.length){

      // 🔥 SET LOGIN STATE
      localStorage.setItem("isLoggedIn","true");
      localStorage.setItem("userEmail",email);

      // 🔥 REDIRECT SYSTEM (FIXED)
      const redirectPage = localStorage.getItem("redirectAfterLogin");
      const lastPage = localStorage.getItem("lastPage");

      let targetPage = "HOME.html";

      if(redirectPage){
        targetPage = redirectPage;
        localStorage.removeItem("redirectAfterLogin");
      }
      else if(lastPage){
        targetPage = lastPage;
        localStorage.removeItem("lastPage");
        localStorage.removeItem("lastPageName");
      }

      setTimeout(()=>{
        window.location.href = targetPage;
      },1200);

      return;
    }

    if(j < lines[i].length){
      terminal.textContent += lines[i][j++];
      setTimeout(type,20);
    } else {
      terminal.textContent += "\n";
      i++; j=0;
      setTimeout(type,300);
    }
  }

  type();
}

// ===== SIGN IN LOADING REDIRECT =====
const authButton = document.getElementById("authButton");

if(authButton){
  authButton.addEventListener("click", function(e){

    // kalau sudah login → jangan ganggu
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    if(isLoggedIn === "true") return;

    e.preventDefault();

    const overlay = document.getElementById("redirectLoading");
    const text = document.getElementById("loadingText");

    overlay.style.display = "flex";

    const lines = [
      "Initializing login module...",
      "Connecting to authentication server...",
      "Preparing secure session...",
      "Redirecting to login..."
    ];

    let i=0, j=0;

    function type(){
      if(i >= lines.length){

        // simpan tujuan (biar balik lagi setelah login)
        localStorage.setItem("redirectAfterLogin", window.location.href);

        setTimeout(()=>{
          window.location.href = "login.html";
        },500);

        return;
      }

      if(j < lines[i].length){
        text.textContent += lines[i][j++];
        setTimeout(type,20);
      }else{
        text.textContent += "\n";
        i++; j=0;
        setTimeout(type,300);
      }
    }

    type();

  });
}

</script>

<div id="redirectLoading" style="
  position:fixed;
  inset:0;
  background:#0f172a;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
">
  <div style="
    background:black;
    padding:20px 30px;
    border-radius:10px;
    color:#00ff88;
    font-family:monospace;
  ">
    <span id="loadingText"></span>
  </div>
</div>

</body>
</html>
