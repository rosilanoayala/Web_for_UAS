<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Lupa Password</title>
<style>
body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#fefce8;}
.box{background:white;padding:40px;border-radius:20px;width:360px;box-shadow:0 10px 30px rgba(0,0,0,.1);}
input,button{width:100%;padding:10px;margin:10px 0;border-radius:10px;}
button{background:#f59e0b;color:white;border:none;}
</style>
</head>
<body>

<div class="box">
<h2>Reset Password</h2>
<input type="email" placeholder="Masukkan email">
<button onclick="reset()">Kirim Link Reset</button>
</div>

<script>
function reset(){
  alert("Link reset password telah dikirim!");
  window.location.href="login.html";
}
</script>

</body>
</html>
