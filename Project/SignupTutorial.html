<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun — DevPortal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens (identik HOME, Login, LupaPassword) ── */
    :root {
      --bg:         #f5f7fa;
      --surface:    #ffffff;
      --border:     #e0e6ed;
      --text:       #2d3748;
      --text-sub:   #5a6a7e;
      --text-muted: #94a3b8;
      --nav-bg:     #282a35;
      --accent:     #04aa6d;
      --accent-dk:  #038c5a;
      --danger:     #dc2626;
      --danger-bg:  #fef2f2;
      --danger-bdr: #fecaca;
      --font-ui:    'Source Sans 3', system-ui, sans-serif;
      --font-code:  'Fira Code', monospace;
      --radius:     10px;
      --shadow-lg:  0 12px 40px rgba(0,0,0,0.13);
      --ease:       cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navbar ─────────────── */
    .topnav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 36px;
      height: 58px;
      background: var(--nav-bg);
      flex-shrink: 0;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon {
      background: var(--accent);
      color: #fff;
      font-family: var(--font-code);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 4px 9px;
      border-radius: 6px;
    }
    .logo-text { font-size: 1.15rem; font-weight: 700; color: #fff; }
    .nav-back {
      text-decoration: none;
      color: #cdd5e0;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, color 0.2s;
    }
    .nav-back:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── Page body ────────────────────────────────────────── */
    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #f0faf5 0%, #e8f4fd 100%);
    }

    /* ── Card ─────────────────────────────────────────────── */
    .signup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }

    .card-header { text-align: center; margin-bottom: 28px; }
    .card-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: rgba(4,170,109,0.1);
      border: 2px solid rgba(4,170,109,0.25);
      border-radius: 14px;
      font-family: var(--font-code);
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .card-title { font-size: 1.5rem; font-weight: 800; color: var(--text); }
    .card-subtitle { font-size: 0.9rem; color: var(--text-sub); margin-top: 5px; }

    #signupNotice {
      background: var(--danger-bg);
      border: 1px solid var(--danger-bdr);
      color: var(--danger);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 0.875rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 18px;
      display: none;
    }
    #signupNotice.visible { display: block; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-ui);
      font-size: 0.925rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(4,170,109,0.15);
      background: #fff;
    }

    .strength-wrap { margin-top: 6px; display: flex; gap: 5px; align-items: center; }
    .strength-bar { flex: 1; height: 4px; border-radius: 4px; background: var(--border); transition: background 0.3s; }
    .strength-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); min-width: 50px; text-align: right; }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 18px 0 6px;
    }
    .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; margin-top: 2px; accent-color: var(--accent); cursor: pointer; }
    .checkbox-group label { font-size: 0.875rem; color: var(--text-sub); cursor: pointer; }
    .checkbox-group label a { color: var(--accent); font-weight: 700; text-decoration: none; }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-ui);
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 10px;
    }
    .btn-primary:hover { background: var(--accent-dk); transform: translateY(-1px); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

    .login-link { text-align: center; font-size: 0.875rem; color: var(--text-sub); }
    .login-link a { color: var(--accent); font-weight: 700; text-decoration: none; }

    /* Terminal overlay */
    #signupOverlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 17, 23, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(8px);
    }
    .terminal-box {
      background: #1e2230;
      border: 1px solid #3a3f55;
      border-radius: 14px;
      width: 90%;
      max-width: 560px;
      overflow: hidden;
      font-family: var(--font-code);
    }
    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 18px;
      background: #161929;
      border-bottom: 1px solid #3a3f55;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }
    .terminal-label { margin-left: 6px; font-size: 0.78rem; color: #6b7280; }
    #signupTerminal {
      padding: 20px 22px;
      font-size: 0.875rem;
      line-height: 1.8;
      color: var(--accent);
      white-space: pre-wrap;
      min-height: 80px;
    }

    .page-footer {
      background: var(--nav-bg);
      padding: 14px 36px;
      text-align: center;
      font-size: 0.78rem;
      color: #5a6370;
      font-family: var(--font-code);
      flex-shrink: 0;
    }
    @media (max-width: 480px) {
      .signup-card { padding: 32px 20px; }
      .topnav { padding: 0 18px; }
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <a href="HOME.html" class="nav-logo">
      <span class="logo-icon">&lt;/&gt;</span>
      <span class="logo-text">DevPortal</span>
    </a>
    <a href="login.html" class="nav-back">← Sudah punya akun? Masuk</a>
  </nav>

  <div class="page-body">
    <div class="signup-card">
      <div class="card-header">
        <div class="card-logo">&lt;/&gt;</div>
        <h1 class="card-title">Buat Akun Baru</h1>
        <p class="card-subtitle">Bergabung dan mulai belajar coding secara gratis</p>
      </div>

      <div id="signupNotice" role="alert"></div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="fullName" class="form-label">Nama Lengkap</label>
          <input type="text" id="fullName" class="form-input" placeholder="Masukkan nama lengkap" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email" class="form-label">Alamat Email</label>
          <input type="email" id="email" class="form-input" placeholder="contoh@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Minimal 6 karakter" required autocomplete="new-password" oninput="checkStrength(this.value)">
          <div class="strength-wrap">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword" class="form-label">Konfirmasi Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Ulangi password kamu" required>
        </div>
        <div class="form-group">
          <label for="securityQuestion" class="form-label">Pertanyaan Keamanan</label>
          <select id="securityQuestion" class="form-input">
            <option value="nama_hewan">Apa nama hewan peliharaanmu?</option>
            <option value="tempat_lahir">Di mana kamu lahir?</option>
            <option value="nama_ibu">Siapa nama ibu kandungmu?</option>
          </select>
        </div>
        <div class="form-group">
          <label for="securityAnswer" class="form-label">Jawaban Keamanan</label>
          <input type="text" id="securityAnswer" class="form-input" placeholder="Jawaban (akan di-hash)" required>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="agreeTerms">
          <label for="agreeTerms">Saya setuju dengan <a href="#">Syarat &amp; Ketentuan</a></label>
        </div>
        <button type="submit" class="btn-primary">🚀 Buat Akun</button>
      </form>

      <div class="divider"><span>atau</span></div>
      <p class="login-link">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
    </div>
  </div>

  <footer class="page-footer">
    © 2025 DevPortal — Portal Tutorial Coding · Rosilano Ayala KA2A
  </footer>

  <div id="signupOverlay">
    <div class="terminal-box">
      <div class="terminal-bar">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span class="terminal-label">terminal — register.sh</span>
      </div>
      <pre id="signupTerminal"></pre>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    function checkStrength(val) {
      const bar1 = document.getElementById("bar1");
      const bar2 = document.getElementById("bar2");
      const bar3 = document.getElementById("bar3");
      const lbl = document.getElementById("strengthLabel");
      const bars = [bar1, bar2, bar3];
      const reset = () => bars.forEach(b => b.style.background = "");
      if (val.length === 0) { reset(); lbl.textContent = ""; return; }
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[0-9!@#$%^&*]/.test(val)) score++;
      reset();
      if (score <= 1) {
        bar1.style.background = "#ef4444";
        lbl.textContent = val.length < 6 ? "Terlalu Pendek" : "Lemah";
        lbl.style.color = "#ef4444";
      } else if (score === 2) {
        bar1.style.background = "#f59e0b";
        bar2.style.background = "#f59e0b";
        lbl.textContent = "Sedang";
        lbl.style.color = "#f59e0b";
      } else {
        bar1.style.background = "#04aa6d";
        bar2.style.background = "#04aa6d";
        bar3.style.background = "#04aa6d";
        lbl.textContent = "Kuat ✓";
        lbl.style.color = "#04aa6d";
      }
    }

    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const name = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const pwd = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;
      const securityQuestion = document.getElementById("securityQuestion").value;
      const securityAnswer = document.getElementById("securityAnswer").value.trim().toLowerCase();
      const agreed = document.getElementById("agreeTerms").checked;

      const notice = document.getElementById("signupNotice");
      notice.classList.remove("visible");

      if (!name) { showNotice('signupNotice', '⚠️ Nama lengkap tidak boleh kosong.', true); return; }
      if (!isValidEmail(email)) { showNotice('signupNotice', '⚠️ Email tidak valid.', true); return; }
      if (!isStrongPassword(pwd)) { showNotice('signupNotice', '⚠️ Password minimal 6 karakter dan harus mengandung angka.', true); return; }
      if (pwd !== confirm) { showNotice('signupNotice', '⚠️ Konfirmasi password tidak cocok.', true); return; }
      if (!securityAnswer) { showNotice('signupNotice', '⚠️ Jawaban keamanan harus diisi.', true); return; }
      if (!agreed) { showNotice('signupNotice', '⚠️ Anda harus menyetujui syarat & ketentuan.', true); return; }

      let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
      if (users.find(u => u.email === email)) {
        showNotice('signupNotice', '❌ Email sudah terdaftar.', true);
        return;
      }

      const hashedPwd = await hashPassword(pwd);
      const hashedAnswer = await hashPassword(securityAnswer);
      users.push({
        email: email,
        passwordHash: hashedPwd,
        name: name,
        securityQuestion: securityQuestion,
        securityAnswerHash: hashedAnswer,
        phone: '', address: '', gender: ''
      });
      localStorage.setItem('registeredUsers', JSON.stringify(users));

      // Animasi terminal
      const overlay = document.getElementById("signupOverlay");
      const terminal = document.getElementById("signupTerminal");
      overlay.style.display = "flex";
      terminal.textContent = "";
      const lines = [
        "// Initializing Registration Module",
        `Creating account for: ${name}`,
        `Email: ${email}`,
        "Encrypting credentials...",
        "Saving user profile...",
        "Account created successfully ✔",
        "Redirecting to login..."
      ];
      let i = 0, j = 0;
      function type() {
        if (i >= lines.length) {
          localStorage.setItem("loginMessage", `✅ Akun berhasil dibuat! Silakan masuk, ${name}.`);
          setTimeout(() => { window.location.href = "login.html"; }, 1000);
          return;
        }
        if (j < lines[i].length) {
          terminal.textContent += lines[i][j++];
          setTimeout(type, 20);
        } else {
          terminal.textContent += "\n";
          i++; j = 0;
          setTimeout(type, 280);
        }
      }
      type();
    });
  </script>
</body>
</html>
