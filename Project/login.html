<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login ke Portal Tutorial Coding">
  <title>Login — DevPortal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ... (CSS sama seperti yang Anda punya, tidak perlu diubah) ... */
    /* Saya tidak akan menulis ulang CSS di sini karena panjang, 
       gunakan CSS yang sudah ada di file Anda. */
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --border: #e0e6ed;
      --text: #2d3748;
      --text-sub: #5a6a7e;
      --text-muted: #94a3b8;
      --nav-bg: #282a35;
      --accent: #04aa6d;
      --accent-dk: #038c5a;
      --danger: #dc2626;
      --font-ui: 'Source Sans 3', system-ui, sans-serif;
      --font-code: 'Fira Code', monospace;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.09);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.14);
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .topnav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 36px;
      height: 58px;
      background: var(--nav-bg);
      flex-shrink: 0;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon {
      background: var(--accent);
      color: #fff;
      font-family: var(--font-code);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 4px 9px;
      border-radius: 6px;
    }
    .logo-text { font-size: 1.15rem; font-weight: 700; color: #fff; }
    .nav-back {
      text-decoration: none;
      color: #cdd5e0;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
    }
    .nav-back:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #f0faf5 0%, #e8f4fd 100%);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .card-header { text-align: center; margin-bottom: 28px; }
    .card-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: rgba(4,170,109,0.1);
      border: 2px solid rgba(4,170,109,0.25);
      border-radius: 14px;
      font-family: var(--font-code);
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .card-title { font-size: 1.5rem; font-weight: 800; color: var(--text); letter-spacing: -0.4px; }
    .card-subtitle { font-size: 0.9rem; color: var(--text-sub); margin-top: 5px; }
    #loginNotice {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.875rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 20px;
      display: none;
    }
    #loginNotice.visible { display: block; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: var(--font-ui);
      font-size: 0.925rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(4,170,109,0.15); background: #fff; }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-ui);
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 6px;
    }
    .btn-primary:hover { background: var(--accent-dk); transform: translateY(-1px); }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .google-btn:hover { background: var(--bg); border-color: #94a3b8; transform: translateY(-1px); }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
    .guest-btn {
      display: block;
      width: 100%;
      padding: 11px;
      background: #f1f5f9;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      text-align: center;
      color: var(--text-sub);
      font-family: var(--font-ui);
      font-size: 0.875rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .guest-btn:hover { background: #e2e8f0; transform: translateY(-1px); }
    .extra-links {
      margin-top: 22px;
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      color: var(--text-sub);
    }
    .extra-links a { color: var(--accent); font-weight: 700; text-decoration: none; transition: color 0.2s; }
    .extra-links a:hover { color: var(--accent-dk); text-decoration: underline; }
    #loginOverlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 17, 23, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(8px);
    }
    .terminal-box {
      background: #1e2230;
      border: 1px solid #3a3f55;
      border-radius: 14px;
      width: 90%;
      max-width: 560px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(4,170,109,0.15);
      font-family: var(--font-code);
    }
    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 18px;
      background: #161929;
      border-bottom: 1px solid #3a3f55;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }
    .terminal-label { margin-left: 6px; font-size: 0.78rem; color: #6b7280; }
    #loginTerminal {
      padding: 20px 22px;
      font-size: 0.875rem;
      line-height: 1.8;
      color: var(--accent);
      white-space: pre-wrap;
      min-height: 80px;
    }
    .page-footer {
      background: var(--nav-bg);
      padding: 14px 36px;
      text-align: center;
      font-size: 0.78rem;
      color: #5a6370;
      font-family: var(--font-code);
      flex-shrink: 0;
    }
    @media (max-width: 480px) {
      .login-card { padding: 32px 22px; }
      .topnav { padding: 0 18px; }
      .extra-links { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <a href="HOME.html" class="nav-logo">
      <span class="logo-icon">&lt;/&gt;</span>
      <span class="logo-text">DevPortal</span>
    </a>
    <a href="HOME.html" class="nav-back">← Kembali ke Home</a>
  </nav>

  <div class="page-body">
    <div class="login-card">
      <div class="card-header">
        <div class="card-logo">&lt;/&gt;</div>
        <h1 class="card-title">Selamat Datang!</h1>
        <p class="card-subtitle">Masuk ke akun DevPortal kamu</p>
      </div>

      <div id="loginNotice" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Alamat Email</label>
          <input type="email" id="email" class="form-input" placeholder="contoh@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Masukkan password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="loginSubmit">Masuk</button>
      </form>

      <a href="#" class="google-btn" id="googleBtn">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google">
        Masuk dengan Google
      </a>

      <div class="divider"><span>atau</span></div>

      <a href="HOME.html" class="guest-btn" id="guestBtn" onclick="setGuest()">
        👤 Lanjut sebagai Guest <span style="font-weight:400;color:#94a3b8;">(Akses Terbatas)</span>
      </a>

      <div class="extra-links">
        <span>Belum punya akun? <a href="SignupTutorial.html">Daftar</a></span>
        <a href="LupaPassword.html">Lupa password?</a>
      </div>
    </div>
  </div>

  <footer class="page-footer">
    © 2025 DevPortal — Portal Tutorial Coding · Rosilano Ayala KA2A
  </footer>

  <div id="loginOverlay">
    <div class="terminal-box">
      <div class="terminal-bar">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
        <span class="terminal-label">terminal — auth.sh</span>
      </div>
      <pre id="loginTerminal"></pre>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    // ========== INISIALISASI DEMO AKUN (jika belum ada) ==========
    (async function initRegisteredUsers() {
      // Pastikan shared.js sudah load, jika tidak, beri peringatan
      if (typeof hashPassword === 'undefined') {
        console.error('shared.js tidak terload!');
        return;
      }
      let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
      if (users.length === 0) {
        const demoHash = await hashPassword('demo123');
        users.push({
          email: 'demo@devportal.id',
          passwordHash: demoHash,
          name: 'Demo User',
          securityQuestion: 'nama_hewan',
          securityAnswerHash: await hashPassword('kucing'),
          phone: '', address: '', gender: ''
        });
        localStorage.setItem('registeredUsers', JSON.stringify(users));
        console.log('Akun demo dibuat:', users);
      }
    })();

    function setGuest() {
      sessionStorage.removeItem('isLoggedIn');
      sessionStorage.setItem('isGuest', 'true');
      window.location.href = 'HOME.html';
    }

    document.addEventListener("DOMContentLoaded", function () {
      // Cek apakah shared.js sudah memberikan fungsi yang diperlukan
      if (typeof hashPassword === 'undefined' || typeof showNotice === 'undefined') {
        alert('Error: file shared.js tidak terload dengan benar. Silakan refresh halaman.');
        console.error('shared.js missing functions');
        return;
      }

      const notice = localStorage.getItem("loginMessage");
      if (notice) {
        const el = document.getElementById("loginNotice");
        el.textContent = notice;
        el.classList.add("visible");
        localStorage.removeItem("loginMessage");
      }

      // Jika sudah login, redirect ke halaman sebelumnya atau HOME
      if (sessionStorage.getItem("isLoggedIn") === "true") {
        const redirectPage = localStorage.getItem("redirectAfterLogin") || "HOME.html";
        localStorage.removeItem("redirectAfterLogin");
        window.location.href = redirectPage;
        return;
      }

      const loginForm = document.getElementById("loginForm");
      const googleBtn = document.getElementById("googleBtn");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const noticeEl = document.getElementById("loginNotice");

      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
          showNotice('loginNotice', '⚠️ Email dan password harus diisi.', true);
          return;
        }
        const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
        console.log('Users di localStorage:', users);
        const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());
        if (!user) {
          showNotice('loginNotice', '❌ Akun belum terdaftar. Silakan daftar dulu.', true);
          return;
        }
        const hashedInput = await hashPassword(password);
        console.log('Hash input:', hashedInput);
        console.log('Hash tersimpan:', user.passwordHash);
        if (user.passwordHash !== hashedInput) {
          showNotice('loginNotice', '❌ Password salah.', true);
          return;
        }
        noticeEl.classList.remove('visible');
        runLoginAnimation(email, user.name || email);
      });

      googleBtn.addEventListener("click", async function (e) {
        e.preventDefault();
        const demoEmail = 'googleuser@gmail.com';
        const demoName = 'Google User';
        let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
        const existing = users.find(u => u.email === demoEmail);
        if (!existing) {
          const hashPwd = await hashPassword('google123');
          users.push({ email: demoEmail, passwordHash: hashPwd, name: demoName, securityQuestion: '', securityAnswerHash: '', phone: '', address: '', gender: '' });
          localStorage.setItem('registeredUsers', JSON.stringify(users));
        }
        runLoginAnimation(demoEmail, demoName);
      });

      function runLoginAnimation(email, displayName) {
        const overlay = document.getElementById("loginOverlay");
        const terminal = document.getElementById("loginTerminal");
        overlay.style.display = "flex";
        terminal.textContent = "";
        const pageName = localStorage.getItem("lastPageName") || "HOME";
        const lines = [
          "// Initializing Authentication Module",
          `User: ${email}`,
          "Connecting to secure server...",
          "Encrypting credentials...",
          "Validating session token...",
          "Access Granted ✔",
          `Welcome, ${displayName || email}!`,
          `Redirecting to ${pageName}...`
        ];
        let i = 0, j = 0;
        function type() {
          if (i >= lines.length) {
            // Set sessionStorage setelah animasi selesai
            sessionStorage.setItem("isLoggedIn", "true");
            sessionStorage.setItem("userEmail", email);
            if (displayName) sessionStorage.setItem("userName", displayName);
            sessionStorage.removeItem("isGuest");
            const redirectPage = localStorage.getItem("redirectAfterLogin");
            const lastPage = localStorage.getItem("lastPage");
            let targetPage = "HOME.html";
            if (redirectPage) {
              targetPage = redirectPage;
              localStorage.removeItem("redirectAfterLogin");
            } else if (lastPage) {
              targetPage = lastPage;
            }
            console.log('Login berhasil, redirect ke:', targetPage);
            setTimeout(() => { window.location.href = targetPage; }, 1200);
            return;
          }
          if (j < lines[i].length) {
            terminal.textContent += lines[i][j++];
            setTimeout(type, 20);
          } else {
            terminal.textContent += "\n";
            i++; j = 0;
            setTimeout(type, 300);
          }
        }
        type();
      }
    });
  </script>
</body>
</html>
